version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      parcel:
        patterns:
          - parcel
          - "@parcel/*"
      lint-and-format:
        patterns:
          - eslint
          - "eslint-*"
          - prettier
          - typescript-eslint
      test-tooling:
        patterns:
          - vitest
          - "@vitest/*"
    ignore:
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
    labels:
      - dependencies
      - maintenance
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - maintenance
